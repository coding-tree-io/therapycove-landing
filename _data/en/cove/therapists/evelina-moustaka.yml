name: Evelina Moustaka
role: Psychologist - Psychotherapist
image: /assets/images/therapist-evelina-moustaka.jpg
alt: Evelina Moustaka
bio: >-
  

  Member of Therapy Cove. After completing her studies—focusing on areas such as stress and health promotion, **Cognitive Behavioural Therapy (CBT)** and **Acceptance and Commitment Therapy (ACT)**, among others—she collaborated with the Institute for Research and Therapy of Behaviour.


  She has volunteered at the nationwide psychosocial support helpline **10306**, providing psychological support, and has been a regular collaborator with various NGOs, participating in initiatives aimed at raising awareness about mental health and organising empowerment groups focused on developing social skills.


  >

  > “The success of our work lies in the moment when the person in therapy no longer tries to suppress or avoid their experiences, but learns to accept themselves and focus on what truly holds value and meaning for them.”
