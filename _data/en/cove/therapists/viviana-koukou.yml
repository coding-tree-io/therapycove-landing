name: Viviana Koukou
role: Social worker - Psychotherapist
image: /assets/images/therapist-viviana-koukou.jpg
alt: Viviana Koukou
bio: >-
  Member of Therapy Cove. Beginning her career by providing psychological
  support to vulnerable populations through collaborations with Greek and
  international organisations, she now works as a psychotherapist for adults. In
  her practice, she accompanies individuals who wish to engage in a process of
  personal exploration and psychological depth, as well as those seeking support
  for more specific concerns such as relationship issues, anxiety, mental health
  disorders, neurodevelopmental conditions, and inner conflicts.


  >

  > “When a person feels truly understood, they can gradually free themselves from guilt, fears, and limiting patterns, and begin to cultivate a more meaningful relationship with themselves and with others.”
