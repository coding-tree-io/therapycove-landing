intro: ""
clients:
  heading: For clients
  body: >-
    **The Therapy Cove team provides psychological support and therapy services
    using an integrative approach, drawing from a wide range of methods and
    approaches that are adapted to the individual needs of each client.**


    **Sessions are available individually, in groups, or for couples and typically last around 50 minutes.**
therapist:
  heading: For therapists
  body: >-
    Accredited mental health professionals can make use of the specially
    designed space at Therapy Cove to conduct their sessions. The Therapy Cove
    team provides full support and services to colleagues who are seeking a
    professional workspace and the means to carry out their vocation.


    In addition, individuals who are studying or undergoing training can attend educational programmes and seminars at Therapy Cove as part of their professional development and career path.
